name: Public Release Guard

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run public release audit
        shell: pwsh
        run: ./scripts/public-release-audit.ps1